name: release-bypass-alert

# Fires a Slack alert when a PR is MERGED to  despite the
# Release Gate's review requirements being unmet (i.e., bypass exercised by a
# member of sf-super-admins or someone with Admin repo-role).
#
# Sibling to ingress-bypass-alert.yml — they cover different gates:
#   - ingress-bypass-alert → required-check failure on ingress merges
#   - release-bypass-alert → reviewDecision != APPROVED on release-branch merges
#
# The Release Gate enforces reviews + codeowner + last-push approval +
# thread-resolution. A bypass means any one of these was unmet at merge time,
# which GitHub surfaces as reviewDecision=REVIEW_REQUIRED (or CHANGES_REQUESTED).
#
# Required checks watched (update list if Release Gate ruleset changes):
#   - Static Code Analysis
#   - Naming Validation
#
# Expected firing rate under healthy ops: near-zero. Each alert should be a
# genuine "someone merged something that should have been blocked."

on:
  pull_request:
    types: [closed]
    branches: []

permissions:
  contents: read
  pull-requests: read

jobs:
  alert:
    name: Release Bypass Alert
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Inspect review decision at merge
        id: inspect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # GraphQL reviewDecision: APPROVED / CHANGES_REQUESTED / REVIEW_REQUIRED / null
          decision=$(gh api graphql -F owner="${{ github.repository_owner }}" -F repo="${{ github.event.repository.name }}" -F number=${PR_NUMBER} -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) { reviewDecision }
              }
            }' --jq '.data.repository.pullRequest.reviewDecision')

          echo "reviewDecision on merge: ${decision}"

          # Race-guard: pull_request.closed can arrive before the GraphQL index
          # updates. If we see null or empty, wait + retry once. GraphQL
          # reviewDecision appears to be computed-on-read (not stored) so the
          # race window may be smaller than ingress's check-runs API — keeping
          # 20s for symmetry with the sibling workflow.
          if [ -z "${decision}" ] || [ "${decision}" = "null" ]; then
            echo "decision unresolved — sleeping 20s and retrying"
            sleep 20
            decision=$(gh api graphql -F owner="${{ github.repository_owner }}" -F repo="${{ github.event.repository.name }}" -F number=${PR_NUMBER} -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) { reviewDecision }
                }
              }' --jq '.data.repository.pullRequest.reviewDecision')
            echo "retry reviewDecision: ${decision}"
          fi

          case "${decision}" in
            APPROVED)
              echo "Release Gate satisfied — no alert."
              echo "alert=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "alert=true" >> "$GITHUB_OUTPUT"
              echo "decision=${decision:-null}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Post Slack alert
        # [E2E] title prefix suppresses Slack per harness convention.
        if: steps.inspect.outputs.alert == 'true' && !startsWith(github.event.pull_request.title, '[E2E]')
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.undefined }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Release Gate bypassed on ${{ github.event.pull_request.base.ref }}",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Release Gate bypass detected" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Base branch:*\n`${{ github.event.pull_request.base.ref }}`" },
                    { "type": "mrkdwn", "text": "*Merged by:*\n`${{ github.event.pull_request.merged_by.login }}`" },
                    { "type": "mrkdwn", "text": "*PR author:*\n`${{ github.event.pull_request.user.login }}`" },
                    { "type": "mrkdwn", "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>" },
                    { "type": "mrkdwn", "text": "*Review decision at merge:*\n`${{ steps.inspect.outputs.decision }}`" },
                    { "type": "mrkdwn", "text": "*Head commit:*\n`${{ github.event.pull_request.head.sha }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "A PR was merged to a Release-Gate branch without an APPROVED review decision. The Release Gate's review requirements (code-owner review + last-push approval + 1 approving review + thread resolution) were bypassed — either via admin privilege or sf-super-admins team membership.\n\nAudit trail: <${{ github.event.pull_request.html_url }}/commits|PR commit history> · <${{ github.event.pull_request.html_url }}|PR conversation>\n\nVerify the bypass was intentional and leave a justification on the PR."
                  }
                }
              ]
            }
