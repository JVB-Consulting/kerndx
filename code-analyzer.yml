engines:
  pmd:
    # Both Kern PMD rulesets are loaded so the right scope is available via
    # `--rule-selector`:
    #
    # - `pmd:KernDXFrameworkPackageSide` — framework-scoped subset. Use for
    #   package-level CI scans of `force-app/`; excludes the
    #   "use the framework API instead of the platform primitive" rules
    #   (`KernNoDirectDML`, `KernNoRawHttp`, `KernUseSchedulerBase`, etc.) since
    #   the package necessarily implements those APIs on top of the primitives.
    # - `pmd:KernDXFrameworkCompliance` — full ruleset. Use for subscriber-style
    #   scans (including release-testing's deliberate-violation fixtures) and
    #   when shipping the ruleset for subscriber adoption.
    custom_rulesets:
      - scanner/kerndx-framework-ruleset.xml
      - scanner/kerndx-pmd-ruleset.xml

rules:
  flow:
    SameRecordFieldUpdates:
      severity: Info
  regex:
    # `regex:NoMixedIndentation` (added to the `Recommended` set in a recent
    # Code Analyzer release) flags any line whose leading whitespace mixes tabs
    # and spaces. Our Apex is tab-indented and ApexDoc continuation lines align
    # the `*` with a single leading space (`\t *`, the standard Javadoc/ApexDoc
    # convention the IDE formatter emits), so the rule fires on essentially
    # every doc comment. Its actual concern — mixed indentation breaking the
    # dedent of `'''` multiline string literals — never applies here, since the
    # package does not use `'''` text blocks. Empty `tags` removes it from every
    # tag selector so it is not run.
    NoMixedIndentation:
      tags: []
