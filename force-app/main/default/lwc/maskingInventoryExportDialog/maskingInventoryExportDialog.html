<template>
	<lightning-modal-header label={labels.title}></lightning-modal-header>
	<lightning-modal-body>
		<p class="dma-inv__intro slds-text-body_small slds-text-color_weak" data-testid="inventory-export-intro">{labels.intro}</p>

		<div class="dma-inv__k">{labels.scopeHeading}</div>
		<lightning-radio-group class="dma-inv__radios" data-testid="inventory-export-scope" label={labels.scopeHeading} onchange={handleScopeChange} options={scopeOptions}
		                       type="radio" value={selectedScope} variant="label-hidden"></lightning-radio-group>

		<div class="dma-inv__k slds-m-top_small">{labels.formatHeading}</div>
		<lightning-radio-group class="dma-inv__radios" data-testid="inventory-export-format" label={labels.formatHeading} onchange={handleFormatChange} options={formatOptions}
		                       type="radio" value={selectedFormat} variant="label-hidden"></lightning-radio-group>
		<p class="dma-inv__format-note slds-text-body_small slds-text-color_weak slds-m-top_xx-small" data-testid="inventory-export-format-note">{labels.formatNote}</p>

		<template lwc:if={canFilterSensitive}>
			<lightning-input checked={sensitiveOnly} class="dma-inv__sensitive-only slds-m-top_x-small" data-testid="inventory-export-sensitive-only" label={labels.sensitiveOnly}
			                 onchange={handleSensitiveOnlyChange} type="checkbox"></lightning-input>
		</template>

		<template lwc:if={showMaskedScopeNote}>
			<p class="dma-inv__masked-note slds-text-body_small slds-text-color_weak slds-m-top_x-small" data-testid="inventory-export-masked-scope-note">
				{labels.maskedScopeNote}</p>
		</template>

		<template lwc:if={needsConfirm}>
			<div class="dma-inv__confirm slds-box slds-box_x-small slds-m-top_medium" role="status">
				<p data-testid="inventory-export-confirm">{confirmText}</p>
				<lightning-button class="slds-m-top_x-small" data-testid="inventory-export-confirm-button" label={labels.confirmButton} onclick={handleConfirm}
				                  variant="neutral"></lightning-button>
			</div>
		</template>

		<template lwc:if={isFetching}>
			<div class="dma-inv__progress slds-m-top_medium" data-testid="inventory-export-progress" role="status">
				<lightning-spinner alternative-text={progressText} size="small"></lightning-spinner>
				<span class="slds-text-body_small slds-m-left_small">{progressText}</span>
			</div>
		</template>

		<template lwc:if={isEmpty}>
			<div class="dma-inv__empty slds-box slds-box_small slds-theme_default slds-text-align_center slds-m-top_medium" data-testid="inventory-export-empty">
				{labels.emptyState}
			</div>
		</template>

		<template lwc:if={isFilteredEmpty}>
			<div class="dma-inv__empty slds-box slds-box_small slds-theme_default slds-text-align_center slds-m-top_medium" data-testid="inventory-export-filtered-empty"
			     role="status">
				{labels.filteredEmptyState}
			</div>
		</template>

		<template lwc:if={hasRows}>
			<div class="dma-inv__k slds-m-top_medium" data-testid="inventory-export-row-count">{rowCountText}</div>
			<div class="dma-inv__preview slds-scrollable_x">
				<table class="slds-table slds-table_bordered slds-table_fixed-layout" data-testid="inventory-export-columns">
					<thead>
					<tr>
						<template for:each={columnHeaders} for:item="column">
							<th key={column.key} scope="col"><span title={column.label}>{column.label}</span></th>
						</template>
					</tr>
					</thead>
					<tbody>
					<template for:each={previewRows} for:item="row">
						<tr data-testid="inventory-export-preview-row" key={row.key}>
							<template for:each={row.cells} for:item="cell">
								<td key={cell.key}><span title={cell.value}>{cell.value}</span></td>
							</template>
						</tr>
					</template>
					</tbody>
				</table>
			</div>
			<template lwc:if={hasMoreRows}>
				<p class="dma-inv__more slds-text-body_small slds-text-color_weak slds-m-top_x-small" data-testid="inventory-export-more-rows">{moreRowsText}</p>
			</template>
		</template>

		<template lwc:if={hasPartialFailure}>
			<p class="dma-inv__partial slds-text-body_small slds-text-color_error slds-m-top_x-small" data-testid="inventory-export-partial-failure" role="status">
				{partialFailureText} </p>
		</template>
	</lightning-modal-body>
	<lightning-modal-footer>
		<lightning-button data-testid="inventory-export-close" label={labels.close} onclick={handleClose}></lightning-button>
		<lightning-button class="slds-m-left_x-small" data-testid="inventory-export-download" disabled={downloadDisabled} label={downloadLabel} onclick={handleDownload}
		                  variant="brand"></lightning-button>
	</lightning-modal-footer>
</template>
