<template>
	<div class="slds-p-around_medium" data-testid="kern-home-root">
		<c-health-check></c-health-check>

		<lightning-card icon-name="utility:setup" title={labels.administrationToolsHeading}>
			<div class="slds-p-horizontal_medium slds-p-bottom_small">
				<div class="slds-grid slds-wrap slds-gutters">
					<template for:each={tools} for:item="tool">
						<div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-p-bottom_small tool-card-wrapper" key={tool.key}>
							<lightning-card class="tool-card" icon-name={tool.iconName} title={tool.title}>
								<div class="tool-card-body slds-p-horizontal_medium slds-p-bottom_small">
									<p class="slds-text-body_small slds-text-color_weak tool-card-description">{tool.description}</p>
									<div class="tool-card-footer slds-m-top_small">
										<lightning-button data-key={tool.key} label={tool.buttonLabel} onclick={handleLaunch}></lightning-button>
									</div>
								</div>
							</lightning-card>
						</div>
					</template>
				</div>
			</div>
		</lightning-card>
	</div>
</template>
