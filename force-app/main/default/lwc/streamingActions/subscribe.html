<template>
	<lightning-card title={labels.subscribeChannelTitle}>
		<div class="slds-var-p-horizontal_large">
			<form onsubmit={handleSubscribe}>
				<lightning-combobox data-testid="event-type" label={labels.eventType} onchange={handleSubEventTypeChange} options={subscribeEventTypes}
				                    placeholder={labels.selectTypePlaceholder} value={subEventType}></lightning-combobox>
				<lightning-combobox data-testid="event-name" disabled={isSubscribeEventNameDisabled} label={labels.eventName} onchange={handleSubEventNameChange}
				                    options={subscribeEventNames} placeholder={subEventNamePlaceholder} value={subscribeEventName}></lightning-combobox>
				<lightning-input disabled={isSubscribeChannelDisabled} label={labels.streamingChannel} name="subChannel" onchange={handleValueChange}
				                 value={subChannel}></lightning-input>
				<lightning-combobox disabled={isSubscribeDisabled} label={labels.replayOption} name="subReplayOption" onchange={handleValueChange} options={replayOptions}
				                    value={subReplayOption}></lightning-combobox>
				<lightning-input label={labels.replayId} lwc:if={isCustomReplayIdVisible} name="subReplayId" onchange={handleValueChange} required type="number"
				                 value={subReplayId}></lightning-input>
				<div class="slds-align_absolute-center slds-var-m-top_medium">
					<lightning-button data-testid="subscribe-button" disabled={isSubscribeDisabled} label={labels.subscribe} type="submit" variant="brand"></lightning-button>
				</div>
				<!-- CDC enablement warning -->
				<c-notice lwc:if={isCDCSubscription}>
					<p>
						<lightning-formatted-rich-text value={labels.noticeCdcEnablement}></lightning-formatted-rich-text>
					</p>
				</c-notice>
				<!-- Event monitoring enablement warning -->
				<c-notice lwc:elseif={isEventMonitoringSubscription}>
					<p>
						<lightning-formatted-rich-text value={labels.noticeMonitoringEnablement}></lightning-formatted-rich-text>
					</p>
				</c-notice>
			</form>
		</div>
	</lightning-card>
</template>
