<template>
	<lightning-card title={labels.publishEventTitle}>
		<div class="slds-var-p-horizontal_large">
			<c-notice>
				<p>{publishScopeNote}</p>
			</c-notice>
			<lightning-combobox data-testid="event-type" label={labels.eventType} onchange={handlePubEventTypeChange} options={publishEventTypes}
			                    placeholder={labels.selectTypePlaceholder} value={pubEventType}></lightning-combobox>
			<template lwc:if={pubEventType}>
				<lightning-combobox data-testid="event-name" disabled={isPublishEventNameDisabled} label={labels.eventName} onchange={handlePubEventNameChange}
				                    options={pubEventNames} placeholder={pubEventNamePlaceholder} value={publishEventName}></lightning-combobox>
				<lightning-input disabled label={labels.streamingChannel} value={publishChannel}></lightning-input>
				<lightning-textarea data-testid="publish-payload" disabled={isPublishDisabled} field-level-help={publishPayloadHelp} label={labels.eventPayload}
				                    onchange={handlePubPayloadChange} value={publishPayload}></lightning-textarea>
				<div class="slds-align_absolute-center slds-var-m-top_medium">
					<lightning-button data-testid="publish-button" disabled={isPublishDisabled} label={labels.publish} onclick={handlePublish} variant="brand"></lightning-button>
				</div>
			</template>
		</div>
	</lightning-card>
</template>
