<template>
	<lightning-card title="Register a streaming event source">
		<div class="slds-var-p-horizontal_large">
			<lightning-combobox class="slds-var-m-bottom_medium" label="Event type" name="registrationEventType" onchange={handleValueChange} options={registrationEventTypes}
			                    placeholder="Select type" value={registrationEventType}></lightning-combobox>

			<template lwc:if={isPushTopicReg}>
				<p class="slds-var-m-bottom_small">
					Customize and execute the following code in Apex to register
					a new PushTopic: </p>
				<p class="slds-textarea push-topic-code">
					PushTopic pushTopic = new PushTopic();<br/>
					pushTopic.Name = 'ClosedCaseUpdates';<br/>
					pushTopic.Query = 'SELECT Id, Subject FROM Case WHERE
					Status=\'Closed\'';<br/>
					pushTopic.ApiVersion = 65.0;<br/>
					pushTopic.NotifyForOperationCreate = true;<br/>
					pushTopic.NotifyForOperationUpdate = true;<br/>
					pushTopic.NotifyForOperationUndelete = true;<br/>
					pushTopic.NotifyForOperationDelete = true;<br/>
					pushTopic.NotifyForFields = 'Referenced';<br/>
					insert pushTopic; </p>
			</template>
			<template lwc:elseif={isGenericReg}>
				Navigate to the&nbsp; <a href="/lightning/o/StreamingChannel/list">Streaming Channel</a>&nbsp;tab to register a generic event.
			</template>
			<template lwc:elseif={isPlatformEventReg}>
				Navigate to the&nbsp; <a href="/lightning/setup/EventObjects/home">Platform Event</a>&nbsp;page in Setup to register a custom platform event.
			</template>
			<template lwc:elseif={isStandardPlatformEventReg}>
				Standard platform events do not need to be registered.
				See&nbsp; <a href="https://developer.salesforce.com/docs/atlas.en-us.platform_events.meta/platform_events/platform_events_objects_list.htm"
				             rel="noopener noreferrer" target="_blank">documentation</a>.
			</template>
			<template lwc:elseif={isStandardCDCReg}>
				Navigate to the&nbsp; <a href="/lightning/setup/CdcObjectEnablement/home">Change Data Capture</a>&nbsp;page in Setup to activate a change data capture event.
			</template>
			<template lwc:elseif={isCustomChannelPEReg}>
				Custom channels cannot be declared via the user interface.
				Follow these&nbsp; <a
					href="https://developer.salesforce.com/docs/atlas.en-us.240.0.platform_events.meta/platform_events/platform_events_custom_channel_configure.htm"
					rel="noopener noreferrer" target="_blank">metadata deploy instructions</a>.
			</template>
			<template lwc:elseif={isCustomChannelCDCReg}>
				Custom channels cannot be declared via the user interface.
				Follow these&nbsp; <a href="https://developer.salesforce.com/docs/atlas.en-us.change_data_capture.meta/change_data_capture/cdc_custom_channel.htm"
				                      rel="noopener noreferrer" target="_blank">metadata deploy
				instructions</a>.
			</template>
			<template lwc:elseif={isMonitoringReg}>
				Streaming must be enabled in&nbsp; <a href="/lightning/setup/EventManager/home">Event Manager</a>&nbsp;in order to receive Monitoring Events.
			</template>
		</div>
	</lightning-card>
</template>
