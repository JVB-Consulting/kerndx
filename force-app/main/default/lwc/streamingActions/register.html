<template>
	<lightning-card title={labels.registerSourceTitle}>
		<div class="slds-var-p-horizontal_large">
			<lightning-combobox class="slds-var-m-bottom_medium" label={labels.eventType} name="registrationEventType" onchange={handleValueChange} options={registrationEventTypes}
			                    placeholder={labels.selectTypePlaceholder} value={registrationEventType}></lightning-combobox>

			<template lwc:if={isPushTopicReg}>
				<p class="slds-var-m-bottom_small">{labels.pushTopicIntro}</p>
				<!-- Apex code sample — untranslatable API code, not subscriber copy (i18n-allow markers) -->
				<p class="slds-textarea push-topic-code"><!-- i18n-allow -->
					PushTopic pushTopic = new PushTopic();<br/><!-- i18n-allow -->
					pushTopic.Name = 'ClosedCaseUpdates';<br/><!-- i18n-allow -->
					pushTopic.Query = 'SELECT Id, Subject FROM Case WHERE
					Status=\'Closed\'';<br/><!-- i18n-allow -->
					pushTopic.ApiVersion = 65.0;<br/><!-- i18n-allow -->
					pushTopic.NotifyForOperationCreate = true;<br/><!-- i18n-allow -->
					pushTopic.NotifyForOperationUpdate = true;<br/><!-- i18n-allow -->
					pushTopic.NotifyForOperationUndelete = true;<br/><!-- i18n-allow -->
					pushTopic.NotifyForOperationDelete = true;<br/><!-- i18n-allow -->
					pushTopic.NotifyForFields = 'Referenced';<br/><!-- i18n-allow -->
					insert pushTopic; </p><!-- i18n-allow -->
			</template>
			<template lwc:elseif={isGenericReg}>
				<lightning-formatted-rich-text value={labels.regGeneric}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isPlatformEventReg}>
				<lightning-formatted-rich-text value={labels.regPlatformEvent}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isStandardPlatformEventReg}>
				<lightning-formatted-rich-text value={labels.regStandardPlatformEvent}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isStandardCDCReg}>
				<lightning-formatted-rich-text value={labels.regChangeDataCapture}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isCustomChannelPEReg}>
				<lightning-formatted-rich-text value={labels.regCustomChannelPE}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isCustomChannelCDCReg}>
				<lightning-formatted-rich-text value={labels.regCustomChannelCDC}></lightning-formatted-rich-text>
			</template>
			<template lwc:elseif={isMonitoringReg}>
				<lightning-formatted-rich-text value={labels.noticeMonitoringEnablement}></lightning-formatted-rich-text>
			</template>
		</div>
	</lightning-card>
</template>
