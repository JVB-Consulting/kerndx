<template>
	<lightning-card title="Event usage metrics">
		<div slot="actions">
			<lightning-badge label={eventCountLabel}></lightning-badge>
		</div>

		<div class="slds-var-p-horizontal_large">
			<c-notice>Each dot represents an hour. The time that is displayed is the
				start of the period.
			</c-notice>
			<div class="slds-var-m-bottom_large slds-border_bottom">
				<c-streaming-usage-filters event-types={eventTypeDefinitions} onfilterchange={handleFilterChange}></c-streaming-usage-filters>
			</div>
			<div class={timelineClasses} lwc:dom="manual"></div>
		</div>
	</lightning-card>
</template>
