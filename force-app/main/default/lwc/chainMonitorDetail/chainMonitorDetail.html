<template>
	<template if:true={isLoading}>
		<div class="slds-var-p-around_medium">
			<lightning-spinner alternative-text="Loading chain detail" size="small"></lightning-spinner>
		</div>
	</template>
	<template if:true={hasDetail}>
		<div class="slds-var-p-around_medium" data-testid="chain-detail">
			<!-- Header with status -->
			<div class="slds-media slds-media_center slds-var-m-bottom_x-small">
				<div class="slds-media__figure">
					<lightning-icon data-testid="status-icon" icon-name={statusIconName} size="medium"></lightning-icon>
				</div>
				<div class="slds-media__body">
					<h2 class="slds-text-heading_small slds-var-m-bottom_xxx-small" data-testid="chain-name">{detail.chainName}</h2>
					<div class="slds-grid slds-grid_vertical-align-center">
						<lightning-badge class="slds-var-m-right_small" data-testid="status-badge" label={detail.status}></lightning-badge>
						<span class="slds-text-body_small slds-text-color_weak" data-testid="progress-label">{progressLabel}</span>
					</div>
				</div>
				<template if:true={hasCorrelationId}>
					<div class="slds-media__figure slds-media__figure_reverse">
						<lightning-button data-testid="view-logs" icon-name="utility:rows" label={label.viewLogs} onclick={handleViewLogs} variant="neutral"></lightning-button>
					</div>
				</template>
			</div>

			<!-- Progress bar -->
			<div class="slds-var-m-bottom_small">
				<lightning-progress-bar data-testid="progress-bar" size="x-small" value={progressPercent} variant="circular"></lightning-progress-bar>
			</div>

			<!-- Steps -->
			<lightning-accordion active-section-name={activeSections} allow-multiple-sections-open>
				<lightning-accordion-section label="Steps" name="steps">
					<c-chain-step-timeline chain-status={detail.status} data-testid="step-timeline" steps={detail.steps}></c-chain-step-timeline>
				</lightning-accordion-section>

				<!-- Timing -->
				<lightning-accordion-section label="Timing" name="timing">
					<dl class="timing-grid" data-testid="timing-grid">
						<div>
							<dt>Started</dt>
							<dd data-testid="started-at">
								<lightning-formatted-date-time day="numeric" hour="2-digit" minute="2-digit" month="short" second="2-digit" value={detail.startedAt}
								                               year="numeric"></lightning-formatted-date-time>
							</dd>
						</div>
						<template if:true={hasCompletedAt}>
							<div>
								<dt>Completed</dt>
								<dd data-testid="completed-at">
									<lightning-formatted-date-time day="numeric" hour="2-digit" minute="2-digit" month="short" second="2-digit" value={detail.completedAt}
									                               year="numeric"></lightning-formatted-date-time>
								</dd>
							</div>
						</template>
						<div>
							<dt>Duration</dt>
							<dd data-testid="duration">{detail.durationLabel}</dd>
						</div>
						<div>
							<dt>Correlation ID</dt>
							<dd>
								<span class="slds-truncate" data-testid="correlation-id" title={detail.correlationId}>{detail.correlationId}</span>
								<lightning-button-icon alternative-text="Copy correlation ID" data-testid="copy-correlation" icon-name="utility:copy_to_clipboard"
								                       onclick={handleCopyCorrelation} size="x-small" variant="bare"></lightning-button-icon>
							</dd>
						</div>
					</dl>
				</lightning-accordion-section>

				<!-- Error -->
				<template if:true={hasError}>
					<lightning-accordion-section label="Error" name="error">
						<div class="slds-box slds-box_x-small slds-theme_error slds-text-body_small" data-testid="error-message" style="white-space: pre-wrap;">
							{detail.errorMessage}
						</div>
					</lightning-accordion-section>
				</template>
			</lightning-accordion>
		</div>
	</template>
	<template if:false={hasDetail}>
		<template if:false={isLoading}>
			<div class="slds-illustration slds-illustration_small slds-var-p-around_large">
				<div class="slds-text-longform">
					<h3 class="slds-text-heading_medium slds-text-color_weak">Select a chain</h3>
					<p class="slds-text-body_regular slds-text-color_weak">
						Choose a chain execution from the list to view step details. </p>
				</div>
			</div>
		</template>
	</template>
</template>
