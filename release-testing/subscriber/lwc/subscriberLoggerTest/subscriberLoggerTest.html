<template>
	<lightning-card title="19: LWC Logger — Persistence & Custom Context">
		<div class="slds-p-around_medium">
			<lightning-button label="Run API Tests" onclick={runAllTests}></lightning-button>
			<lightning-button class="slds-m-left_small" label="Test Persistence" onclick={testPersistence}></lightning-button>
			<template lwc:if={hasResults}>
				<ul class="slds-list_dotted slds-m-top_small">
					<template for:each={results} for:item="result">
						<li key={result.name}>{result.label}</li>
					</template>
				</ul>
			</template>
		</div>
	</lightning-card>
</template>
