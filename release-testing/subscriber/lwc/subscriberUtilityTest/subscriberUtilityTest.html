<template>
	<lightning-card title="21: Utility Module Imports">
		<div class="slds-p-around_medium">
			<lightning-button label="Run Tests" onclick={runTests}></lightning-button>
			<lightning-button class="slds-m-left_small" label="Test Logger Persistence" onclick={testLoggerPersistence}></lightning-button>
			<template lwc:if={hasResults}>
				<ul class="slds-list_dotted slds-m-top_small">
					<template for:each={results} for:item="result">
						<li key={result.name}>{result.label}</li>
					</template>
				</ul>
			</template>
		</div>
	</lightning-card>
</template>
